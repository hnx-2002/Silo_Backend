<!DOCTYPE html>
<html lang="en">
    <head>

        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>genUI</title>
    </head>

    <body>
        <div id="app"></div>
        <script type="module">
            import { createApp } from 'vue';
            import App from '/genUI/index.vue';
            import i18n from '/src/assets/utility/i18n.js';
            import dict from '/src/assets/utility/localization.js';
            import '/src/assets/theme/tcdri.scss';
            var app = createApp(App);
            app.use(i18n);
            app.mount('#app');
            dict.overrideLocalStorageEvent(); //重写localStorage事件
            dict.initLoginDictionary();
        </script>
    </body>
</html>
